project:
  name: Example Natural Gas QA Project
  profile: balanced

outputs:
  timestamped_output_folder: true
  insert_summary_page: true
  annotate_pdf: true
  export_text: false
  export_words: false
  html_report: true
  excel_report: true
  single_review_packet_pdf: true
  single_review_packet_name: single_review_packet.pdf

reference_files:
  drawing_index: ""
  valve_list: ""
  line_list: ""
  instrument_index: ""
  equipment_list: ""

normalization:
  fuzzy_tags: true
  remove_separators_for_match: false
  alias_table: ""
  ignore_patterns: ""

pdf:
  min_words_per_page: 20

review:
  # False-positive controls for real drawing sets. Raise thresholds for stricter,
  # lower-noise reviews; lower them only after checking local smoke-test packets.
  title_block_required_fields: [sheet_number, revision, issue_date, checked_by]
  title_block_min_extracted_fields: 2
  title_block_min_words: 30
  title_block_missing_confidence: 0.55
  sheet_number_min_title_fields: 1
  sheet_number_min_words: 20
  duplicate_sheet_confidence: 0.85
  reference_only_min_searchable_page_ratio: 0.75
  min_tag_hit_confidence: 0.70
  min_tag_length: 4
  coating_note_min_distinct_terms: 2
  regulator_detector_terms: [regulator, regulating station, reg station, worker regulator, monitor regulator]

annotation:
  add_issue_id_labels: true
  issue_id_label_font_size: 7

rules:
  MATERIAL_SPEC_CHECK:
    enabled: true
    severity: Minor
  COATING_NOTE_CHECK:
    enabled: true
    severity: Minor
  AI_COMMENT_DRAFTS:
    enabled: false
  SYMBOL_RECOGNITION_STUB:
    enabled: false
